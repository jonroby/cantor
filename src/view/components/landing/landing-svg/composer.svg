<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">

  <defs>
    <filter id="composer-shadow" x="-10%" y="-60%" width="120%" height="240%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="rgba(0,0,0,0.12)" />
    </filter>
  </defs>

  <!-- Composer shell -->
  <rect x="256" y="576" width="768" height="118" rx="20" fill="white"
    stroke="#e3e3e3" stroke-width="1"
    filter="url(#composer-shadow)"
  />

  <!-- + attach button -->
  <circle cx="294" cy="611" r="17" fill="white" stroke="#e3e3e3" stroke-width="1"/>
  <g transform="translate(285.5, 602.5) scale(0.75)" fill="none" stroke="rgba(23,23,23,0.5)" stroke-width="2" stroke-linecap="round">
    <path d="M5 12h14"/>
    <path d="M12 5v14"/>
  </g>

  <!-- Placeholder text -->
  <text x="322" y="616" font-size="15" fill="rgba(23,23,23,0.3)">Chat...</text>

  <!-- Send button -->
  <circle cx="996" cy="611" r="17" fill="#1f1f1f"/>
  <g transform="translate(987.5, 602.5) scale(0.75)" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="m5 12 7-7 7 7"/>
    <path d="M12 19V5"/>
  </g>

  <!-- Footer divider -->
  <line x1="272" y1="638" x2="1008" y2="638" stroke="#e8e8e8" stroke-width="1"/>

  <!-- Model chip -->
  <rect x="272" y="649" width="116" height="28" rx="6" fill="white" stroke="#e3e3e3" stroke-width="1"/>
  <circle cx="290" cy="663" r="7" fill="#d97706" opacity="0.85"/>
  <text x="302" y="668" font-size="11.5" font-weight="500" fill="rgba(23,23,23,0.7)">gemma4:latest</text>

  <!-- Agent chip -->
  <rect x="398" y="649" width="56" height="28" rx="6" fill="white" stroke="#e3e3e3" stroke-width="1"/>
  <text x="414" y="668" font-size="11.5" font-weight="500" fill="rgba(23,23,23,0.7)">Agent</text>

  <!-- Tools chip -->
  <rect x="464" y="649" width="52" height="28" rx="6" fill="white" stroke="#e3e3e3" stroke-width="1"/>
  <text x="478" y="668" font-size="11.5" font-weight="500" fill="rgba(23,23,23,0.7)">Tools</text>

  <!-- Vertical divider before right section -->
  <line x1="652" y1="651" x2="652" y2="675" stroke="#e8e8e8" stroke-width="1"/>

  <!-- Settings icon: scale 24→16px, center at (668,663) → top-left at (660,655) -->
  <g transform="translate(660, 655) scale(0.667)" fill="none" stroke="rgba(23,23,23,0.4)" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/>
    <circle cx="12" cy="12" r="2.5"/>
  </g>

  <text x="677" y="667" font-size="11.5" fill="rgba(23,23,23,0.45)">Context Window</text>

  <!-- Progress track -->
  <rect x="775" y="659" width="140" height="5" rx="3" fill="#efefef"/>
  <rect x="775" y="659" width="34" height="5" rx="3" fill="rgba(23,23,23,0.75)"/>

  <!-- Token count -->
  <text x="924" y="668" font-size="11.5" fill="rgba(23,23,23,0.45)">2,058 / 131,072</text>

</svg>
