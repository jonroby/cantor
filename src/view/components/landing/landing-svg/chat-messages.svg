<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">

  <!-- Header bar for main chat panel -->
  <rect x="216" y="0" width="1064" height="52" fill="#fafafa"/>
  <line x1="216" y1="52" x2="1280" y2="52" stroke="#e8e8e8" stroke-width="1"/>
  <text x="240" y="32" font-size="13.75" font-weight="600" fill="rgba(23,23,23,0.8)">Test</text>

  <!-- model label top-left of chat -->
  <text x="240" y="78" font-size="12" fill="rgba(23,23,23,0.4)">gemma4:latest</text>

  <!-- ── User message bubble ── -->
  <!-- Right-aligned dark bubble -->
  <rect x="694" y="88" width="550" height="62" rx="12" fill="#1f1f1f"/>
  <text x="716" y="115" font-size="13.75" fill="rgba(255,255,255,0.9)" font-weight="500">test</text>

  <!-- ── Assistant response ── -->
  <!-- Success checkmark + bold prefix -->
  <!-- Green checkbox circle -->
  <circle cx="252" cy="180" r="8" fill="#16a34a" opacity="0.15"/>
  <circle cx="252" cy="180" r="8" fill="none" stroke="#16a34a" stroke-width="1.5"/>
  <!-- checkmark -->
  <polyline points="248,180 251,183 257,177" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="268" y="185" font-size="13.75" fill="rgba(23,23,23,0.88)">
    <tspan font-weight="700">Test successful!</tspan>
    <tspan font-weight="400"> I'm here, paying attention, and</tspan>
  </text>
  <text x="240" y="207" font-size="13.75" fill="rgba(23,23,23,0.88)">ready to keep working through the probability problems!</text>

  <!-- emoji -->
  <text x="663" y="207" font-size="13.75">🧠</text>

  <text x="240" y="236" font-size="13.75" fill="rgba(23,23,23,0.88)">Did you have another section in that "introduction.md</text>

  <!-- Action row below message -->
  <!-- trash icon -->
  <g transform="translate(678, 256) scale(0.583)" fill="none" stroke="rgba(23,23,23,0.3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="3 6 5 6 21 6"/>
    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
    <path d="M10 11v6M14 11v6"/>
    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
  </g>
  <!-- fork icon -->
  <g transform="translate(700, 256) scale(0.583)" fill="none" stroke="rgba(23,23,23,0.3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="6" cy="18" r="3"/>
    <circle cx="6" cy="6" r="3"/>
    <circle cx="18" cy="6" r="3"/>
    <path d="M6 21v-3M6 9v3m0 0c0 2 3 3 6 3s6 1 6 3"/>
  </g>
  <!-- code icon -->
  <g transform="translate(722, 256) scale(0.583)" fill="none" stroke="rgba(23,23,23,0.3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="16 18 22 12 16 6"/>
    <polyline points="8 6 2 12 8 18"/>
  </g>

</svg>
